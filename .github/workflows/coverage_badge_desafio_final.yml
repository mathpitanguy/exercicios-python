name: Atualiza badge do Desafio Final

on:
  push:
    branches:
      - main
    paths:
      - "desafio_final/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala Poetry
        run: pipx install poetry

      - name: Instala dependências
        run: poetry install

      - name: Gera badge do desafio final
        continue-on-error: true
        run: |
          poetry run pytest \
            desafio_final/tests/test_.py \
            --local-badge-output-dir . \
            --local-badge-generate=status

      - name: Verifica se a badge foi gerada
        run: |
          test -f tests.svg

      - name: Renomeia a badge
        run: |
          mv tests.svg desafio-final.svg

      - name: Prepara diretório para publicação
        run: |
          mkdir badge
          cp desafio-final.svg badge/

      - name: Publica badge
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: badge-desafio-final
          publish_dir: badge
          force_orphan: true