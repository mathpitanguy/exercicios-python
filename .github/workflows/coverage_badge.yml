name: Atualiza badge de testes

on:
  push:
    branches:
      - main
    paths:
      - "exercicios/**"
      - "tests/**"
      - "pyproject.toml"
      - "poetry.lock"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configura Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instala Poetry
        run: pipx install poetry

      - name: Instala dependências
        run: poetry install

      - name: Gera badge
        continue-on-error: true
        run: |
          poetry run pytest \
            --local-badge-output-dir . \
            --local-badge-generate=status

      - name: Verifica se a badge foi gerada
        run: |
          test -f tests.svg

      - name: Prepara diretório para publicação
        run: |
          mkdir badge
          cp tests.svg badge/

      - name: Publica badge
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: coverage-badge
          publish_dir: badge
          force_orphan: true
